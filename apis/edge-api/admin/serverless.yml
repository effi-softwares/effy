# edge-admin — Effy cold-path back-office/admin service (004-backend-bootstrap A3; hosts the
# 005 back-office console's endpoints). Attaches to the Terraform-owned shared HTTP API
# (shared-gateway.contract.md): NO API/stage/CORS/authorizers here. Routes live under /admin/.
service: effy-edge-admin
frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    # 🧑‍💻 CONFIRM the latest Parameters-and-Secrets extension layer version for the region.
    secretsExtensionArn: arn:aws:lambda:ap-southeast-2:665172237481:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:90
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-2
  stage: ${opt:stage, 'dev'}
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 004-backend-bootstrap
    service: admin
  httpApi:
    id: ${ssm:/effy/${sls:stage}/edge/http_api_id}
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
    # Shop-pool provisioning (009): the pool id the shops slice creates users in. Resolved from
    # the auth contract at deploy time — never hard-coded (R3).
    SHOP_USER_POOL_ID: ${ssm:/effy/${sls:stage}/auth/shop/user_pool_id}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
        # Shop-management provisioning (009): admin Cognito actions, scoped to the SHOP pool ARN
        # ONLY (least privilege). An authorized server-side provisioning write, not token brokering
        # — the routes stay behind the back-office authorizer (Constitution Check, research R3).
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminDisableUser
            - cognito-idp:AdminEnableUser
          Resource: ${ssm:/effy/${sls:stage}/auth/shop/user_pool_arn}
  layers:
    - ${param:secretsExtensionArn}
  vpc:
    securityGroupIds:
      - ${ssm:/effy/${sls:stage}/edge/security_group_id}
    subnetIds: ${ssm:/effy/${sls:stage}/edge/subnet_ids}

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  individually: true

functions:
  health:
    handler: src/functions/health-get.handler
    description: Liveness + readiness (DB probe), public — admin service
    events:
      - httpApi:
          method: GET
          path: /admin/healthz

  backOfficePingV1:
    handler: src/functions/back-office-ping-v1-get.handler
    description: Identity-enforcement proving route (back-office pool + group RBAC)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeMeV1:
    handler: src/functions/back-office-me-v1-get.handler
    description: Staff-identity read — records (JIT upsert) + returns the platform record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeAdminPingV1:
    handler: src/functions/back-office-admin-ping-v1-get.handler
    description: Administrator-only proving route — authorizes from the DB record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/admin-ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  # ── Shop management (009). All back-office authorizer; read = any active staff, mutate = admin/manager. ──
  shopsListV1:
    handler: src/functions/shops-list-v1-get.handler
    description: List shops (paginated/filterable/searchable) — 009
    events:
      - httpApi:
          method: GET
          path: /admin/v1/shops
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopGetV1:
    handler: src/functions/shop-get-v1-get.handler
    description: Shop detail + roster — 009
    events:
      - httpApi:
          method: GET
          path: /admin/v1/shops/{shopId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopAuditV1:
    handler: src/functions/shop-audit-v1-get.handler
    description: Shop + user audit history — 009
    events:
      - httpApi:
          method: GET
          path: /admin/v1/shops/{shopId}/audit
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopCreateV1:
    handler: src/functions/shop-create-v1-post.handler
    description: Create shop + provision primary manager — 009
    events:
      - httpApi:
          method: POST
          path: /admin/v1/shops
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopUpdateV1:
    handler: src/functions/shop-update-v1-patch.handler
    description: Edit shop details — 009
    events:
      - httpApi:
          method: PATCH
          path: /admin/v1/shops/{shopId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopStatusV1:
    handler: src/functions/shop-status-v1-post.handler
    description: Change shop lifecycle status — 009
    events:
      - httpApi:
          method: POST
          path: /admin/v1/shops/{shopId}/status
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopDeleteV1:
    handler: src/functions/shop-delete-v1-delete.handler
    description: Remove a dependent-free shop — 009
    events:
      - httpApi:
          method: DELETE
          path: /admin/v1/shops/{shopId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopUserCreateV1:
    handler: src/functions/shop-user-create-v1-post.handler
    description: Add a user to a shop (provision) — 009
    events:
      - httpApi:
          method: POST
          path: /admin/v1/shops/{shopId}/users
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  shopUserUpdateV1:
    handler: src/functions/shop-user-update-v1-patch.handler
    description: Change a shop user's role and/or status — 009
    events:
      - httpApi:
          method: PATCH
          path: /admin/v1/shops/{shopId}/users/{userId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

# Per-function CloudWatch alarms. API-level 5xx alarm lives in Terraform (A3).
resources:
  Resources:
    HealthErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-health-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
