# edge-admin — Effy cold-path back-office/admin service (004-backend-bootstrap A3; hosts the
# 005 back-office console's endpoints). Attaches to the Terraform-owned shared HTTP API
# (shared-gateway.contract.md): NO API/stage/CORS/authorizers here. Routes live under /admin/.
service: effy-edge-admin
frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    # 🧑‍💻 CONFIRM the latest Parameters-and-Secrets extension layer version for the region.
    secretsExtensionArn: arn:aws:lambda:ap-southeast-1:044395824272:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:12
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-1
  stage: ${opt:stage, 'dev'}
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 004-backend-bootstrap
    service: admin
  httpApi:
    id: ${ssm:/effy/${sls:stage}/edge/http_api_id}
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
  layers:
    - ${param:secretsExtensionArn}
  vpc:
    securityGroupIds:
      - ${ssm:/effy/${sls:stage}/edge/security_group_id}
    subnetIds: ${ssm:/effy/${sls:stage}/edge/subnet_ids}

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  individually: true

functions:
  health:
    handler: src/functions/health-get.handler
    description: Liveness + readiness (DB probe), public — admin service
    events:
      - httpApi:
          method: GET
          path: /admin/healthz

  backOfficePingV1:
    handler: src/functions/back-office-ping-v1-get.handler
    description: Identity-enforcement proving route (back-office pool + group RBAC)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeMeV1:
    handler: src/functions/back-office-me-v1-get.handler
    description: Staff-identity read — records (JIT upsert) + returns the platform record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeAdminPingV1:
    handler: src/functions/back-office-admin-ping-v1-get.handler
    description: Administrator-only proving route — authorizes from the DB record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/admin-ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

# Per-function CloudWatch alarms. API-level 5xx alarm lives in Terraform (A3).
resources:
  Resources:
    HealthErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-health-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    BackOfficePingV1ErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-bo-ping-v1-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref BackOfficePingV1LambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    BackOfficeMeV1ErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-bo-me-v1-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref BackOfficeMeV1LambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    BackOfficeMeV1DurationP95Alarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-bo-me-v1-duration-p95
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions: [{ Name: FunctionName, Value: !Ref BackOfficeMeV1LambdaFunction }]
        ExtendedStatistic: p95
        Period: 300
        EvaluationPeriods: 3
        Threshold: 5000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    BackOfficeAdminPingV1ErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-bo-admin-ping-v1-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref BackOfficeAdminPingV1LambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
