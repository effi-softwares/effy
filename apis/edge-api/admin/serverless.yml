# edge-admin — Effy cold-path back-office/admin service (004-backend-bootstrap A3; hosts the
# 005 back-office console's endpoints). Attaches to the Terraform-owned shared HTTP API
# (shared-gateway.contract.md): NO API/stage/CORS/authorizers here. Routes live under /admin/.
service: effy-edge-admin
frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    # 🧑‍💻 CONFIRM the latest Parameters-and-Secrets extension layer version for the region.
    secretsExtensionArn: arn:aws:lambda:ap-southeast-2:665172237481:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:90
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-2
  stage: ${opt:stage, 'dev'}
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 004-backend-bootstrap
    service: admin
  httpApi:
    id: ${ssm:/effy/${sls:stage}/edge/http_api_id}
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
    # Shop-pool provisioning (009): the pool id the shops slice creates users in. Resolved from
    # the auth contract at deploy time — never hard-coded (R3).
    SHOP_USER_POOL_ID: ${ssm:/effy/${sls:stage}/auth/shop/user_pool_id}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
        # Shop-management provisioning (009): admin Cognito actions, scoped to the SHOP pool ARN
        # ONLY (least privilege). An authorized server-side provisioning write, not token brokering
        # — the routes stay behind the back-office authorizer (Constitution Check, research R3).
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminDisableUser
            - cognito-idp:AdminEnableUser
          Resource: ${ssm:/effy/${sls:stage}/auth/shop/user_pool_arn}
  layers:
    - ${param:secretsExtensionArn}
  # NO provider.vpc — the functions run OUTSIDE the VPC (dev posture, 2026-07-12). An in-VPC
  # Lambda has no internet without NAT, so every public AWS API it calls (Cognito, for the 009
  # shop-user provisioning) hangs to its timeout unless given an interface endpoint. Running
  # outside the VPC gives Cognito + Secrets Manager a working path for $0 and drops ~$18/mo of
  # endpoints. The trade: these functions reach the DB over its PUBLIC endpoint, so the dev DB
  # admits 0.0.0.0/0 (TLS forced, RDS-managed 32-char password). DEV ONLY — see infra/envs/README.md.

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  individually: true

functions:
  # Two probes, both PUBLIC and unversioned. Split on purpose: a combined probe cannot tell
  # "this service is not deployed" from "the database is down" — both just look red.
  healthz:
    handler: src/functions/healthz-get.handler
    description: Liveness — is the admin service deployed and executing? Touches nothing. Public.
    events:
      - httpApi:
          method: GET
          path: /admin/healthz

  readyz:
    handler: src/functions/readyz-get.handler
    description: Readiness — can the admin service serve? Probes the DB under a 2s budget. Public.
    events:
      - httpApi:
          method: GET
          path: /admin/readyz

  backOfficePingV1:
    handler: src/functions/back-office-ping-v1-get.handler
    description: Identity-enforcement proving route (back-office pool + group RBAC)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeMeV1:
    handler: src/functions/back-office-me-v1-get.handler
    description: Staff-identity read — records (JIT upsert) + returns the platform record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  backOfficeAdminPingV1:
    handler: src/functions/back-office-admin-ping-v1-get.handler
    description: Administrator-only proving route — authorizes from the DB record (005)
    events:
      - httpApi:
          method: GET
          path: /admin/v1/admin-ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/back-office_id}

  # ── Shop management (009). All back-office authorizer; read = any active staff, mutate = admin/manager. ──
  shopsListV1:
    handler: src/functions/shops-list-v1-get.handler
    description: List shops (paginated/filterable/searchable) — 009
    events:
