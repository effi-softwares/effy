# edge-customer — Effy cold-path CUSTOMER service (011-customer-storefront-web).
# Attaches to the Terraform-owned shared HTTP API (shared-gateway.contract.md): NO API/stage/
# CORS/authorizers created here (those live in infra/envs/<env>/edge-gateway.tf). Routes live
# under /customer/. Serverless 3.40.0 pinned (frozen v3; benign nodejs22.x schema warning).
#
# ⚠ THE ROUTING LAW (FR-028). This service carries CUSTOMER PROFILE / ACCOUNT MANAGEMENT ONLY.
# Product, catalog, search, cart, order and payment are LATENCY-SENSITIVE customer traffic and
# belong to the hot path (core-api, Go) — constitution Principle III. Adding a commerce route
# here requires a justified, recorded exception in that feature's plan. Do not do it quietly.
service: effy-edge-customer
frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    # 🧑‍💻 CONFIRM the latest Parameters-and-Secrets extension layer version for the region.
    secretsExtensionArn: arn:aws:lambda:ap-southeast-2:665172237481:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:90
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-2
  stage: ${opt:stage, 'dev'}
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 011-customer-storefront-web
    service: customer
  # Attach to the shared HTTP API (A3). external id → no API/stage/CORS/authorizers here.
  httpApi:
    id: ${ssm:/effy/${sls:stage}/edge/http_api_id}
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
    CUSTOMER_USER_POOL_ID: ${ssm:/effy/${sls:stage}/auth/customer/user_pool_id}
    # 012 — the recovery-confirm route calls the UNAUTHENTICATED `ConfirmForgotPassword`, which is
    # keyed on the app client id rather than the pool id.
    CUSTOMER_APP_CLIENT_ID: ${ssm:/effy/${sls:stage}/auth/customer/app_client_id}
    # 012 FR-025 — the "your password changed" notification. Branded sender comes from 010.
    NOTIFY_SENDER: no-reply@${sls:stage}.effyshopping.com
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}

        # 012 FR-025 — the password-change notification. THE ONLY NEW PERMISSION IN THE 012 SLICE.
        #
        # ⚠ Worth pausing on: the four Cognito calls 012 adds (ChangePassword,
        # GetUserAttributeVerificationCode, VerifyUserAttribute, GlobalSignOut) need NO IAM AT ALL.
        # AWS is explicit — "Amazon Cognito doesn't evaluate IAM policies in requests for this API
        # operation." They are authorized by the CUSTOMER'S OWN ACCESS TOKEN, so this service is
        # relaying the customer's authority rather than exercising its own. A compromised customer
        # Lambda still cannot touch an account whose token it does not hold.
        #
        # That is why the block below is about EMAIL, and not about passwords.
        - Effect: Allow
          Action: ses:SendEmail
          Resource: "*"

        # Account linking (FR-011). An authorized ADMINISTRATIVE write against the CUSTOMER pool
        # — the same shape as 006's first-admin bootstrap and 009's shop-user provisioning. It is
        # NOT cross-pool auth: the resource below is the customer pool ARN and nothing else, so
        # Principle IV holds. A token from another audience still cannot reach this service at all
        # — the gateway authorizer refuses it before any of this code runs.
        - Effect: Allow
          Action:
            - cognito-idp:ListUsers
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminLinkProviderForUser
          Resource: ${ssm:/effy/${sls:stage}/auth/customer/user_pool_arn}
  layers:
    - ${param:secretsExtensionArn}
  # NO provider.vpc — the functions run OUTSIDE the VPC (dev posture, 2026-07-12), same as
  # edge-admin/edge-shop. DEV ONLY — see infra/envs/README.md.

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  individually: true

functions:
  healthz:
    handler: src/functions/healthz-get.handler
    description: Liveness — is the customer service deployed and executing? Touches nothing. Public.
    events:
      - httpApi:
          method: GET
          path: /customer/healthz

  readyz:
    handler: src/functions/readyz-get.handler
    description: Readiness — can the customer service serve? Probes the DB under a 2s budget. Public.
    events:
      - httpApi:
          method: GET
          path: /customer/readyz

  customerMeV1:
    handler: src/functions/customer-me-v1-get.handler
    description: Record-backed customer identity read — JIT upsert + the platform record (011 FR-023)
    events:
      - httpApi:
          method: GET
          path: /customer/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  customerMeV1Patch:
    handler: src/functions/customer-me-v1-patch.handler
    description: The customer maintains their own details — displayName ONLY (011 FR-026)
    events:
      - httpApi:
          method: PATCH
          path: /customer/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  # ── 022: address book (customer profile management — cold path per 011 FR-028) ────────────────

  customerAddressesV1Get:
    handler: src/functions/customer-addresses-v1-get.handler
    description: List the customer's saved delivery addresses, default first (022 US1)
    events:
      - httpApi:
          method: GET
          path: /customer/v1/addresses
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  customerAddressesV1Post:
    handler: src/functions/customer-addresses-v1-post.handler
    description: Add a delivery address; first address auto-defaults (022 US2)
    events:
      - httpApi:
          method: POST
          path: /customer/v1/addresses
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  customerAddressesV1IdPatch:
    handler: src/functions/customer-addresses-v1-id-patch.handler
    description: Edit an address and/or set it as default (022 US3/US5)
    events:
      - httpApi:
          method: PATCH
          path: /customer/v1/addresses/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  customerAddressesV1IdDelete:
    handler: src/functions/customer-addresses-v1-id-delete.handler
    description: Delete an address; the default-with-others delete is refused 409 (022 US4, FR-016a)
    events:
      - httpApi:
          method: DELETE
          path: /customer/v1/addresses/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  # ── 012: password & sessions ────────────────────────────────────────────────────────────────

  # Sends the STEP-UP CODE that setting a first password costs (012 FR-017).
  #
  # ⚠ It GRANTS NOTHING — it puts a code in an inbox. No grant is minted and no state is stored, so
  # there is nothing here for an attacker to steal. The code is only worth something when presented
  # back, WITH a new password, to the route below, in ONE request.
  customerPasswordV1Challenge:
    handler: src/functions/customer-password-v1-challenge.handler
    description: Step-up — email a single-purpose code before a FIRST password may be set (012 FR-017)
    events:
      - httpApi:
          method: POST
          path: /customer/v1/password/challenge
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  # ⚠⚠ THE SECURITY CORE OF 012. ⚠⚠
  #
  # Cognito will let ANY bearer of a valid access token silently plant a permanent password on a
  # PASSWORDLESS account — its own docs say `PreviousPassword` may be omitted when the user has none.
  # That converts a borrowed session into durable, credentialed access, and an OTP-only customer would
  # never notice. This route is where that is refused: `mode: set` verifies a freshly emailed code
  # IMMEDIATELY BEFORE writing the password, in the same request.
  customerPasswordV1Put:
    handler: src/functions/customer-password-v1-put.handler
    description: Set (step-up gated) or change (current-password gated) the password (012 FR-016/FR-017)
    events:
      - httpApi:
          method: PUT
          path: /customer/v1/password
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  customerSessionsV1Delete:
    handler: src/functions/customer-sessions-v1-delete.handler
    description: Sign out on all devices — the remedy for a hotel PC or a lost phone (012 FR-032)
    events:
      - httpApi:
          method: DELETE
          path: /customer/v1/sessions
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/customer_id}

  # ⚠ DELIBERATELY PUBLIC — note the ABSENT `authorizer` block. This is not an omission.
  #
  # The caller has NO SESSION; that is the entire point of account recovery. They prove the INBOX
  # instead, and Cognito checks the emailed code. The Cognito API it wraps (ConfirmForgotPassword) is
  # itself unauthenticated and needs no IAM, so this route holds no privilege at all.
  #
  # It exists because leaving recovery client-side (as 011 did) caused two defects at once: it
  # BYPASSED the breach screening, and it left `has_password` permanently WRONG — so the account page
  # went on offering "Set a password" to someone who had one (012 FR-022b).
  customerPasswordResetConfirm:
    handler: src/functions/customer-password-reset-confirm.handler
    description: PUBLIC — complete "forgot password"; screens the new password + records the state (012 FR-022b)
    events:
      - httpApi:
          method: POST
          path: /customer/v1/password/reset-confirm

  # ⚠ NOT an HTTP route. This is a COGNITO TRIGGER — it is invoked by the customer user pool
  # itself, immediately before a profile is created. It has no `events` block on purpose; the
  # pool is wired to it in infra/envs/<env>/auth-customer.tf, and Cognito's permission to invoke
  # it is granted there too.
  #
  # It is the ACCOUNT-LINKING trigger: without it, a customer who signs in with Google gets a
  # SECOND, duplicate account, and there is no retroactive merge (FR-011). It also REFUSES to
  # link an identity whose email the provider has not verified — see src/lib/account-linking.ts
  # for why that refusal is the difference between a feature and an account-takeover primitive.
  preSignUp:
    handler: src/functions/pre-sign-up.handler
    description: Cognito pre-sign-up — links a federated identity into the NATIVE profile (011 FR-011/FR-012)
