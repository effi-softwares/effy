# edge-shop — Effy cold-path shop/operator service (004-backend-bootstrap, amendment A3).
# Attaches to the Terraform-owned shared HTTP API (shared-gateway.contract.md): NO API/stage/
# CORS/authorizers created here (those live in infra/envs/<env>/edge-gateway.tf). Routes live
# under /shop/. Serverless 3.40.0 pinned (frozen v3; benign nodejs22.x schema warning).
service: effy-edge-shop
frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    # 🧑‍💻 CONFIRM the latest Parameters-and-Secrets extension layer version for the region.
    secretsExtensionArn: arn:aws:lambda:ap-southeast-2:665172237481:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:90
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-2
  stage: ${opt:stage, 'dev'}
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 004-backend-bootstrap
    service: shop
  # Attach to the shared HTTP API (A3). external id → no API/stage/CORS/authorizers here.
  httpApi:
    id: ${ssm:/effy/${sls:stage}/edge/http_api_id}
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
    # Product-media bucket (016). Provisioned by infra/envs/<env>/media.tf; the name is published
    # at /effy/<env>/media/bucket. Direct-to-S3 presigned upload/read (research R9).
    S3_MEDIA_BUCKET: ${ssm:/effy/${sls:stage}/media/bucket}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
        # Product media (016): read/write objects in the product-media bucket only. Scoped to the
        # bucket's object ARN — never a wildcard. Presigned URLs inherit this identity's authority.
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: arn:aws:s3:::effy-${sls:stage}-product-media/*
  layers:
    - ${param:secretsExtensionArn}
  # NO provider.vpc — the functions run OUTSIDE the VPC (dev posture, 2026-07-12). Same rationale
  # as edge-admin: no NAT means an in-VPC Lambda cannot reach public AWS APIs, and the dev DB is
  # reachable on its public endpoint instead. DEV ONLY — see infra/envs/README.md.

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  individually: true

functions:
  # Two probes, both PUBLIC and unversioned. Split on purpose: a combined probe cannot tell
  # "this service is not deployed" from "the database is down" — both just look red.
  healthz:
    handler: src/functions/healthz-get.handler
    description: Liveness — is the shop service deployed and executing? Touches nothing. Public.
    events:
      - httpApi:
          method: GET
          path: /shop/healthz

  readyz:
    handler: src/functions/readyz-get.handler
    description: Readiness — can the shop service serve? Probes the DB under a 2s budget. Public.
    events:
      - httpApi:
          method: GET
          path: /shop/readyz

  platformStatusV1:
    handler: src/functions/platform-status-v1-get.handler
    description: Proving read v1 (three-layer traversal to the dev DB), public
    events:
      - httpApi:
          method: GET
          path: /shop/v1/status

  platformStatusV2:
    handler: src/functions/platform-status-v2-get.handler
    description: Proving read v2 — version-coexistence demo (reshaped payload), public
    events:
      - httpApi:
          method: GET
          path: /shop/v2/status

  shopPingV1:
    handler: src/functions/shop-ping-v1-get.handler
    description: Shop identity-enforcement proving route (shop pool)
    events:
      - httpApi:
          method: GET
          path: /shop/v1/ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  shopMeV1:
    handler: src/functions/shop-me-v1-get.handler
    description: Shop-identity read — records (JIT upsert) + returns the platform record (007)
    events:
      - httpApi:
          method: GET
          path: /shop/v1/me
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  shopManagerPingV1:
    handler: src/functions/shop-manager-ping-v1-get.handler
    description: Manager-only proving route — authorizes from the DB record (role AND status AND shop scope, 007)
    events:
      - httpApi:
          method: GET
          path: /shop/v1/manager-ping
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  # ── Product catalog (016). Shop authorizer; any active shop member; every query shop-scoped. ──
  catalogSchemaV1:
    handler: src/functions/catalog-schema-v1-get.handler
    description: Catalog schema-read — active types + attributes + category tree (drives the create form) — 016
    events:
      - httpApi:
          method: GET
          path: /shop/v1/catalog/schema
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productsListV1:
    handler: src/functions/products-list-v1-get.handler
    description: List products — backend search/filter/sort/pagination, shop-scoped (SC-004) — 016
    events:
      - httpApi:
          method: GET
          path: /shop/v1/products
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productGetV1:
    handler: src/functions/product-get-v1-get.handler
    description: Product detail, shop-scoped — 016
    events:
      - httpApi:
          method: GET
          path: /shop/v1/products/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productCreateV1:
    handler: src/functions/product-create-v1-post.handler
    description: Create a shop-owned product (draft) — 016
    events:
      - httpApi:
          method: POST
          path: /shop/v1/products
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productMediaCreateV1:
    handler: src/functions/product-media-create-v1-post.handler
    description: Presign a direct-to-S3 image upload — 016
    events:
      - httpApi:
          method: POST
          path: /shop/v1/products/{id}/media
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productMediaRegisterV1:
    handler: src/functions/product-media-register-v1-post.handler
    description: Register an uploaded image object — 016
    events:
      - httpApi:
          method: POST
          path: /shop/v1/products/{id}/media/register
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productUpdateV1:
    handler: src/functions/product-update-v1-patch.handler
    description: Focused edit with optimistic concurrency (FR-023a) — 016
    events:
      - httpApi:
          method: PATCH
          path: /shop/v1/products/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productStatusV1:
    handler: src/functions/product-status-v1-post.handler
    description: Change product lifecycle status (publish re-validates mandatory) — 016
    events:
      - httpApi:
          method: POST
          path: /shop/v1/products/{id}/status
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productDeleteV1:
    handler: src/functions/product-delete-v1-delete.handler
    description: Hard-delete an unreferenced draft (else 409, archive) — 016
    events:
      - httpApi:
          method: DELETE
          path: /shop/v1/products/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productSectionsV1:
    handler: src/functions/product-sections-v1-patch.handler
    description: Set a product's section membership — 016
    events:
      - httpApi:
          method: PATCH
          path: /shop/v1/products/{id}/sections
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productMediaPatchV1:
    handler: src/functions/product-media-patch-v1-patch.handler
    description: Reorder / set primary / alt text on a media object — 016
    events:
      - httpApi:
          method: PATCH
          path: /shop/v1/products/{id}/media/{mediaId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  productMediaDeleteV1:
    handler: src/functions/product-media-delete-v1-delete.handler
    description: Delete a media object (active product keeps a primary) — 016
    events:
      - httpApi:
          method: DELETE
          path: /shop/v1/products/{id}/media/{mediaId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  sectionsListV1:
    handler: src/functions/sections-list-v1-get.handler
    description: List this shop's sections — 016
    events:
      - httpApi:
          method: GET
          path: /shop/v1/sections
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  sectionCreateV1:
    handler: src/functions/sections-create-v1-post.handler
    description: Create a shop section — 016
    events:
      - httpApi:
          method: POST
          path: /shop/v1/sections
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  sectionUpdateV1:
    handler: src/functions/sections-update-v1-patch.handler
    description: Rename / reorder a section — 016
    events:
      - httpApi:
          method: PATCH
          path: /shop/v1/sections/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  sectionDeleteV1:
    handler: src/functions/sections-delete-v1-delete.handler
    description: Delete a section — 016
    events:
      - httpApi:
          method: DELETE
          path: /shop/v1/sections/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  # ── Order fulfilment (020). Shop authorizer; ANY active shop member (both shop_manager and
  # shop_staff — fulfilment is floor work, FR-019a); every query scoped to the caller's own shop,
  # never client input. ──
  fulfillmentsListV1:
    handler: src/functions/fulfillments-list-v1-get.handler
    description: The shop's order queue — promise-ordered, shop-scoped (SC-002) — 020
    events:
      - httpApi:
          method: GET
          path: /shop/v1/fulfillments
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  fulfillmentGetV1:
    handler: src/functions/fulfillment-get-v1-get.handler
    description: Pick screen — this shop's lines only, no payment data; acknowledges on first open — 020
    events:
      - httpApi:
          method: GET
          path: /shop/v1/fulfillments/{id}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  fulfillmentStatusV1:
    handler: src/functions/fulfillment-status-v1-post.handler
    description: Advance or reverse a portion — guarded, concurrency-safe (FR-014, SC-005) — 020
    events:
      - httpApi:
          method: POST
          path: /shop/v1/fulfillments/{id}/status
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  fulfillmentItemV1:
    handler: src/functions/fulfillment-item-v1-patch.handler
    description: Record picking progress / flag an item unavailable — no money moves (FR-010b) — 020
    events:
      - httpApi:
          method: PATCH
          path: /shop/v1/fulfillments/{id}/items/{orderItemId}
          authorizer:
            type: jwt
            id: ${ssm:/effy/${sls:stage}/edge/authorizer/shop_id}

  # ⚠ THE DEV-ONLY PICKUP STUB IS DELIBERATELY **NOT REGISTERED HERE** (020 FR-031, SC-013).
  #
  # src/functions/fulfillment-pickup-v1-post.ts exists and is unit-tested, but NO route points at it
  # in ANY environment — so `POST /shop/v1/fulfillments/{id}/pickup` correctly returns 404 even in
  # dev. That is the expected probe result, and a 403 would mean the route had been added and is a
  # SC-013 failure.
  #
  # Why absence rather than a flag: the endpoint accepts a CALLER-SUPPLIED driver identity. Reachable
  # anywhere deployed, it is an order-state forgery primitive — anyone who can reach the URL could
  # mark any shop's order collected with no driver involved. A runtime flag or env var is the wrong
  # control because it can be misconfigured into being on; an absent route cannot.
  #
  # To exercise it locally: `pnpm --filter @effy/edge-shop stub:pickup` (scripts/invoke-pickup-stub.mjs)
  # invokes the handler in-process against your local DB. Do NOT add an httpApi event to make that
  # easier. REMOVAL TRIGGER: delete the handler, this comment, scripts/invoke-pickup-stub.mjs, and
  # repository.collectViaStub() when the driver slice ships a real dispatch path (FR-034).

# Per-function CloudWatch alarms (Errors>0, Throttles>0, Duration p95). The API-level 5xx
# alarm lives in Terraform (A3 — the API's owner), not here.
resources:
  Resources:
    # healthz does no work, so it can essentially only fail on a broken bundle or a runtime init
    # error — which makes an error here an unambiguous "this deploy is broken" signal.
    HealthzErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-healthz-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthzLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    # readyz is the probe that touches the database — the failures and the latency both live here.
    # (A DB outage returns 503 rather than throwing, so this catches the probe ITSELF breaking.)
    ReadyzErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-readyz-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref ReadyzLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    # Duration belongs on readyz, NOT healthz: healthz does nothing, so its p95 measures only cold
    # starts and would alarm on noise. readyz's p95 tracks the DB round-trip — a real signal.
    ReadyzDurationP95Alarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-readyz-duration-p95
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions: [{ Name: FunctionName, Value: !Ref ReadyzLambdaFunction }]
        ExtendedStatistic: p95
        Period: 300
        EvaluationPeriods: 3
        Threshold: 5000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    PlatformStatusV1ErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-status-v1-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref PlatformStatusV1LambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    PlatformStatusV2ErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-status-v2-errors
