# JS/TS workspace (Turborepo + pnpm — CLAUDE.md locked). First member landed with
# 004-backend-bootstrap; the web surfaces and shared packages (design-system,
# api-client, shared-types) join here with their own slices.
packages:
  - "apis/edge-api/*"
  - "apps/*"
  - "packages/*"

# Postinstall scripts are opt-in under pnpm 10; these need theirs to function
# (esbuild places its platform binary; turbo likewise).
onlyBuiltDependencies:
  - esbuild
  - turbo
  # Next.js image optimization (011 customer-web). Without its postinstall, sharp cannot place
  # its platform binary and next/image falls back to the (much slower) JS path.
  - sharp
