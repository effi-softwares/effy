# edge-api — Effy's cold path (specs/004-backend-bootstrap).
# Serverless Framework pinned 3.40.0 (the final v3 release; research C1). The frozen
# v3 schema predates nodejs22.x → deploys emit ONE benign "Invalid configuration"
# warning (research C2). NEVER set configValidationMode: error. Escape hatch when the
# freeze bites: the `osls` fork (drop-in).
service: effy-edge-api
frameworkVersion: "3"

plugins:
  # Order matters: esbuild must precede offline.
  - serverless-esbuild
  - serverless-offline

params:
  default:
    logLevel: info
    corsOrigins:
      - http://localhost:3000
      - http://localhost:5173 # back-office web dev origin (005) — Vite default port
    # AWS Parameters and Secrets Lambda Extension, ap-southeast-1 / arm64.
    # 🧑‍💻 CONFIRM the latest layer version for the region before the first deploy:
    # https://docs.aws.amazon.com/systems-manager/latest/userguide/ps-integration-lambda-extensions.html
    secretsExtensionArn: arn:aws:lambda:ap-southeast-1:044395824272:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:12
  dev:
    logLevel: debug

provider:
  name: aws
  region: ap-southeast-1
  stage: ${opt:stage, 'dev'}
  # nodejs22.x: the current Lambda-supported LTS. Deviation from the constitution's
  # "Node 20" (deprecated by AWS 2026-04-30) — recorded in plan.md Complexity
  # Tracking; operator ratifies the constitution PATCH (T046).
  runtime: nodejs22.x
  architecture: arm64
  memorySize: 256
  timeout: 10
  logRetentionInDays: 30
  tags:
    project: effy
    slice: 004-backend-bootstrap
  # Non-secret config resolves at DEPLOY TIME from the platform contract
  # (contracts/config.contract.md). The DB password NEVER enters this template —
  # only its ARN does; functions fetch the value at runtime via the extension.
  environment:
    EFFY_ENV: ${sls:stage}
    LOG_LEVEL: ${param:logLevel}
    DB_HOST: ${ssm:/effy/${sls:stage}/db/endpoint}
    DB_PORT: ${ssm:/effy/${sls:stage}/db/port}
    DB_NAME: ${ssm:/effy/${sls:stage}/db/name}
    DB_USER: ${ssm:/effy/${sls:stage}/db/master_username}
    DB_SECRET_ARN: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
  iam:
    role:
      statements:
        # Least privilege at service scope: read exactly one secret, nothing else.
        # Refinement to true per-function roles (serverless-iam-roles-per-function)
        # is recorded in the README for when the function set diversifies.
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: ${ssm:/effy/${sls:stage}/db/master_secret_arn}
  layers:
    - ${param:secretsExtensionArn}
  # Default-VPC placement (plan amendment A1): the dev DB only admits its own VPC's
  # edge-lambda SG (SG-to-SG) — out-of-VPC Lambdas can never reach it. Secrets Manager
  # is reached through the VPC interface endpoint (no NAT, no internet from here).
  # Serverless v3 adds the ENI permissions to the role automatically.
  vpc:
    securityGroupIds:
      - ${ssm:/effy/${sls:stage}/edge/security_group_id}
    # StringList SSM param → serverless v3 splits it into an array at deploy time
    # (IDE schema linters flag this line as "expected array" — false positive).
    subnetIds: ${ssm:/effy/${sls:stage}/edge/subnet_ids}
  httpApi:
    metrics: true
    cors:
      allowedOrigins: ${param:corsOrigins}
      allowedHeaders:
        - Authorization
        - Content-Type
        - X-Request-ID
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      exposedResponseHeaders:
        - x-request-id
      maxAge: 43200
    # AUTH ISOLATION (constitution Principle IV; research C3/D3): one JWT authorizer
    # per Cognito pool — one issuer each, audience = that pool's app client id (API
    # Gateway matches access-token client_id against it). NEVER list multiple pools
    # in one authorizer. Routes pick their pool by authorizer name.
    authorizers:
      customerJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/${ssm:/effy/${sls:stage}/auth/customer/user_pool_id}
        audience:
          - ${ssm:/effy/${sls:stage}/auth/customer/app_client_id}
      driverJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/${ssm:/effy/${sls:stage}/auth/driver/user_pool_id}
        audience:
          - ${ssm:/effy/${sls:stage}/auth/driver/app_client_id}
      shopJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/${ssm:/effy/${sls:stage}/auth/shop/user_pool_id}
        audience:
          - ${ssm:/effy/${sls:stage}/auth/shop/app_client_id}
      backOfficeJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${aws:region}.amazonaws.com/${ssm:/effy/${sls:stage}/auth/back-office/user_pool_id}
        audience:
          - ${ssm:/effy/${sls:stage}/auth/back-office/app_client_id}

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: .mjs
    # The one recurring ESM gotcha: CJS deps (pg) need require() shimmed.
    banner:
      js: import { createRequire } from 'module'; const require = createRequire(import.meta.url);

package:
  # One tree-shaken bundle per function: smallest cold-start artifact (research C2).
  individually: true

functions:
  health:
    handler: src/functions/health-get.handler
    description: Liveness + readiness (DB probe), public, unversioned
    events:
      - httpApi:
          method: GET
          path: /healthz

  platformStatusV1:
    handler: src/functions/platform-status-v1-get.handler
    description: Proving read v1 (three-layer traversal to the dev DB), public
    events:
      - httpApi:
          method: GET
          path: /v1/platform/status

  platformStatusV2:
    handler: src/functions/platform-status-v2-get.handler
    description: Proving read v2 — version-coexistence demo (reshaped payload)
    events:
      - httpApi:
          method: GET
          path: /v2/platform/status

  backOfficePingV1:
    handler: src/functions/back-office-ping-v1-get.handler
    description: Identity-enforcement proving route (back-office pool + group RBAC)
    events:
      - httpApi:
          method: GET
          path: /v1/back-office/ping
          authorizer:
            name: backOfficeJwt

  backOfficeAdminPingV1:
    handler: src/functions/back-office-admin-ping-v1-get.handler
    description: Administrator-only proving route (back-office pool + admin RBAC) — spec US3 (005)
    events:
      - httpApi:
          method: GET
          path: /v1/back-office/admin/ping
          authorizer:
            name: backOfficeJwt

  backOfficeMeV1:
    handler: src/functions/back-office-me-v1-get.handler
    description: Staff-identity read — records (JIT upsert) + returns the platform record — 005 (US4)
    events:
      - httpApi:
          method: GET
          path: /v1/back-office/me
          authorizer:
            name: backOfficeJwt

# Day-1 alarms (research C8; plan telemetry declaration): Lambda Errors>0,
# Throttles>0, Duration p95 per function + HTTP API 5xx. Surfaced in Grafana later
# via the CloudWatch datasource.
resources:
  Resources:
    HealthErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-health-errors
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    HealthThrottlesAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-health-throttles
        Namespace: AWS/Lambda
        MetricName: Throttles
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthLambdaFunction }]
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
    HealthDurationP95Alarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-health-duration-p95
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions: [{ Name: FunctionName, Value: !Ref HealthLambdaFunction }]
        ExtendedStatistic: p95
        Period: 300
        EvaluationPeriods: 3
        Threshold: 5000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching

    PlatformStatusV1ErrorsAlarm:
